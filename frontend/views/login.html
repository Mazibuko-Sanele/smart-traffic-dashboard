<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Smart Traffic Optimizer</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 2 4 5 4 9c0 5 8 13 8 13s8-8 8-13c0-4-3.6-7-8-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"/></svg>
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to access your dashboard</p>
    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <div class="form-row">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" /> Remember me
        </label>
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <p id="loginError" class="error"></p>
    <hr class="divider" />
    <div class="back-home">
      <a href="/">← Back to Home</a>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
