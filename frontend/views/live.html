<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Feed | Real time Traffic Optimizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/live.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <h1>Real time Traffic Optimizer</h1>
    </div>
    <div class="nav-links">
      <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="/analytics"><i class="fas fa-chart-pie"></i> Analytics</a>
      <a href="/simulation"><i class="fas fa-microchip"></i> Simulation</a>
      <a href="/live" class="active"><i class="fas fa-video"></i> Live feed</a>
      <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
      <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span>LIVE DATA</span>
    </div>
  </nav>

  <div class="live-container">
    <div class="stream-card">
      <div class="stream-header">
        <h2><i class="fas fa-video"></i> LIVE CAMERA FEED</h2>
        <div class="stream-status">
          <i class="fas fa-circle" id="status-icon" style="font-size: 10px;"></i>
          <span id="stream-status-text">OFF</span>
        </div>
      </div>
      
      <div class="video-wrapper" id="video-wrapper">
        <div class="placeholder">
          <i class="fas fa-camera"></i>
          <div>Camera is OFF</div>
          <div class="placeholder-sub">Click START to begin streaming</div>
        </div>
      </div>
      
      <div class="stream-controls">
        <button id="startBtn" class="stream-btn start-btn">
          <i class="fas fa-play"></i> START
        </button>
        <button id="stopBtn" class="stream-btn stop-btn">
          <i class="fas fa-stop"></i> STOP
        </button>
        <button id="reloadBtn" class="stream-btn reload-btn">
          <i class="fas fa-sync-alt"></i> RELOAD
        </button>
      </div>
      
      <div class="stream-info">
        <div class="info-item">
          <i class="fas fa-info-circle"></i>
          <span>Stream source: Droidcam (localhost:4747)</span>
        </div>
        <div class="info-item">
          <i class="fas fa-microchip"></i>
          <span>Click START to enable video. STOP to save CPU/GPU.</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/live.js"></script>
</body>
</html>
